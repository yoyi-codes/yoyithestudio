<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=/es/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="yoyithestudio" />
    <link rel="manifest" href="/assets/favicon/site.webmanifest" />

    <title>Redirecting...</title>
    <script>
        const userLang = navigator.language.slice(0, 2).toLowerCase();

        if (userLang === 'es') {
        window.location.replace('/es/index.html');
        } else {
        window.location.replace('/en/index.html');
        }
    </script>
</head>
<body>
    <p>If you are not redirected automatically, choose your language:</p>
    <a href="/en/index.html" style="margin-right: 15px; color: black; font-weight: bold;">English</a>
    <a href="/es/index.html" style="color: black; font-weight: bold;">Español</a>
</body>
</html>
