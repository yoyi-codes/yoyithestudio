<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | YOYI.THE STUDIO</title>
    <!-- Vinculamos la hoja de estilos asumiendo que el archivo css está en la misma carpeta raíz -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        // Si la URL que dio error empieza con "/es/", redirigir a la página en construcción
        if (window.location.pathname.startsWith('/es/')) {
            window.location.replace('/es/index.html');
        }
    </script>
</head>
<body class="bg-[#1C1C1C] h-screen flex flex-col items-center justify-center px-6 overflow-hidden relative">

    <!-- Círculo decorativo de fondo -->
    <div class="absolute w-96 h-96 bg-[#538F50] rounded-full blur-[100px] opacity-30 -z-10"></div>

    <div class="max-w-3xl mx-auto text-center z-10">
        <h1 class="font-display text-8xl md:text-[10rem] text-[#F4939D] mb-2 leading-none drop-shadow-[8px_8px_0px_rgba(0,0,0,1)]">
            404
        </h1>
        
        <h2 class="font-display text-3xl md:text-5xl text-white uppercase mb-6">
            Oops! Are you <span class="text-[#F6C445]">lost?</span>
        </h2>
        
        <p class="font-mono text-lg md:text-xl text-white/80 mb-10">
            The page you are looking for doesn't exist, has been moved, or is currently swimming in the digital void.
        </p>
        
        <!-- Botón para regresar al inicio -->
        <a href="/en/index.html" class="inline-flex items-center gap-3 px-10 py-5 rounded-full font-bold text-xl border-4 border-white bg-transparent text-white hover:bg-[#F6C445] hover:border-[#F6C445] hover:!text-[#1C1C1C] transition-all shadow-[6px_6px_0px_0px_rgba(255,255,255,0.2)] hover:shadow-[6px_6px_0px_0px_rgba(246,196,69,0.4)] hover:-translate-y-1 uppercase font-display">
            Take me Home ✺
        </a>
    </div>

</body>
</html>
